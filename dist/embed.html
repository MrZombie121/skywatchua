<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skywatch UA Embed</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      html, body, #map { height:100%; width:100%; margin:0; }
      body { background:#071018; color:#edf5ff; font-family:Segoe UI, Arial, sans-serif; overflow:hidden; }
      #status { position:absolute; left:12px; top:12px; z-index:1000; background:rgba(7,16,24,.84); border:1px solid rgba(72,194,255,.28); color:#edf5ff; border-radius:12px; padding:10px 12px; max-width:320px; }
    </style>
  </head>
  <body>
    <div id="status">Завантаження карти...</div>
    <div id="map"></div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="/embed.js"></script>
  </body>
</html>
